# Mẫu chạy Kong Manager (image build từ Dockerfile) + PostgreSQL.
# Sao chép: cp docker.env.example .env  rồi chỉnh mật khẩu / biến bắt buộc.
#
#   docker compose --env-file .env up --build
#
# UI + API: http://localhost:8080
# Kong Admin (máy bạn / container khác): đặt KONG_ADMIN_URL trỏ tới đó (vd. http://host.docker.internal:8001).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kongmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kong_manager}
    volumes:
      - kong-manager-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 10

  kong-manager:
    build: .
    ports:
      - "${KONG_MANAGER_PORT:-8080}:8080"
    environment:
      HTTP_ADDR: ":8080"
      STATIC_DIR: /app/dist
      DATABASE_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-kongmanager}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kong_manager}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      KONG_ADMIN_URL: ${KONG_ADMIN_URL:-http://host.docker.internal:8001}
      KONG_PROXY_PREFIX: ${KONG_PROXY_PREFIX:-/kong-admin}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?set BOOTSTRAP_ADMIN_PASSWORD in .env}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy

volumes:
  kong-manager-pg:
